version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Batch the noisy ecosystems so Dependabot doesn't open 30 PRs
      # that each have to clear the full CI gate.
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      next:
        patterns: ["next", "eslint-config-next", "@next/*"]
      prisma:
        patterns: ["prisma", "@prisma/*"]
      testing:
        patterns:
          ["jest", "@types/jest", "ts-jest", "@swc/jest", "@testing-library/*", "@playwright/*", "playwright"]
      opentelemetry:
        patterns: ["@opentelemetry/*"]
    labels: ["dependencies"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "container"]
