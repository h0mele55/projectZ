# Alternate ports + isolated volumes so `npm run test:int` can TRUNCATE
# freely without ever touching the dev stack.
services:
  postgres-test:
    image: postgis/postgis:16-3.4
    container_name: playerz-test-postgres
    environment:
      POSTGRES_USER: playerz
      POSTGRES_PASSWORD: playerz
      POSTGRES_DB: playerz_test
    ports:
      - '55432:5432'
    volumes:
      - playerz-test-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U playerz -d playerz_test']
      interval: 5s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7
    container_name: playerz-test-redis
    ports:
      - '63790:6379'
    volumes:
      - playerz-test-redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch-test:
    image: getmeili/meilisearch:v1.11
    container_name: playerz-test-meili
    environment:
      MEILI_MASTER_KEY: test-master-key
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7701:7700'
    healthcheck:
      test: ['CMD', 'sh', '-c', 'wget -qO- http://127.0.0.1:7700/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

  centrifugo:
    image: centrifugo/centrifugo:v6
    container_name: playerz-test-centrifugo
    command: centrifugo
    # Configured by ENV, not a config file. Centrifugo does NOT expand
    # ${VAR} inside its JSON config — the placeholders stay literal, and the
    # engine then fails on a "malformed connection address" that tells you
    # nothing about why.
    environment:
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: test-token-secret
      CENTRIFUGO_HTTP_API_KEY: test-api-key
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: 'http://localhost:3000'
      CENTRIFUGO_ENGINE_TYPE: redis
      CENTRIFUGO_ENGINE_REDIS_ADDRESS: redis-test:6379
      # WebSocket is on by default in v6. SSE and the health endpoint are not.
      CENTRIFUGO_SSE_ENABLED: 'true'
      CENTRIFUGO_HEALTH_ENABLED: 'true'
      # Presence + history on the chat namespace: history is what lets a
      # reconnecting client recover the messages it missed while offline.
      CENTRIFUGO_CHANNEL_NAMESPACES: >-
        [{"name":"conv","presence":true,"join_leave":true,"history_size":100,"history_ttl":"24h","force_recovery":true},
         {"name":"notif","history_size":50,"history_ttl":"24h","force_recovery":true},
         {"name":"presence","presence":true,"join_leave":true}]
    ports:
      - '8001:8000'
    depends_on:
      - redis-test
    healthcheck:
      test: ['CMD', 'sh', '-c', 'wget -qO- http://127.0.0.1:8000/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  playerz-test-pgdata:
  playerz-test-redisdata:
