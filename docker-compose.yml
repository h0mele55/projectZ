services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: playerz-dev-postgres
    environment:
      POSTGRES_USER: playerz
      POSTGRES_PASSWORD: playerz
      POSTGRES_DB: playerz
    ports:
      - '5432:5432'
    volumes:
      - playerz-dev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U playerz']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: playerz-dev-redis
    ports:
      - '6379:6379'
    volumes:
      - playerz-dev-redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: playerz-dev-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD', 'sh', '-c', 'nc -z localhost 8025']
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: playerz-dev-meili
    environment:
      MEILI_MASTER_KEY: dev-master-key-not-a-secret
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - playerz-dev-meilidata:/meili_data
    healthcheck:
      test: ['CMD', 'sh', '-c', 'wget -qO- http://127.0.0.1:7700/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

  centrifugo:
    image: centrifugo/centrifugo:v6
    container_name: playerz-dev-centrifugo
    command: centrifugo
    # Configured by ENV, not a config file. Centrifugo does NOT expand
    # ${VAR} inside its JSON config — the placeholders stay literal, and the
    # engine then fails on a "malformed connection address" that tells you
    # nothing about why.
    environment:
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: dev-token-secret
      CENTRIFUGO_HTTP_API_KEY: dev-api-key
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: 'http://localhost:3000'
      CENTRIFUGO_ENGINE_TYPE: redis
      CENTRIFUGO_ENGINE_REDIS_ADDRESS: redis:6379
      # WebSocket is on by default in v6. SSE and the health endpoint are not.
      CENTRIFUGO_SSE_ENABLED: 'true'
      CENTRIFUGO_HEALTH_ENABLED: 'true'
      # Presence + history on the chat namespace: history is what lets a
      # reconnecting client recover the messages it missed while offline.
      CENTRIFUGO_CHANNEL_NAMESPACES: >-
        [{"name":"conv","presence":true,"join_leave":true,"history_size":100,"history_ttl":"24h","force_recovery":true},
         {"name":"notif","history_size":50,"history_ttl":"24h","force_recovery":true},
         {"name":"presence","presence":true,"join_leave":true}]
    ports:
      - '8000:8000'
    depends_on:
      - redis
    healthcheck:
      test: ['CMD', 'sh', '-c', 'wget -qO- http://127.0.0.1:8000/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  playerz-dev-meilidata:
  playerz-dev-pgdata:
  playerz-dev-redisdata:
