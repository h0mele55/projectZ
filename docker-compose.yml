services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: playerz-dev-postgres
    environment:
      POSTGRES_USER: playerz
      POSTGRES_PASSWORD: playerz
      POSTGRES_DB: playerz
    ports:
      - '5432:5432'
    volumes:
      - playerz-dev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U playerz']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: playerz-dev-redis
    ports:
      - '6379:6379'
    volumes:
      - playerz-dev-redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: playerz-dev-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD', 'sh', '-c', 'nc -z localhost 8025']
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: playerz-dev-meili
    environment:
      MEILI_MASTER_KEY: dev-master-key-not-a-secret
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - playerz-dev-meilidata:/meili_data
    healthcheck:
      test: ['CMD', 'sh', '-c', 'wget -qO- http://127.0.0.1:7700/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  playerz-dev-meilidata:
  playerz-dev-pgdata:
  playerz-dev-redisdata:
